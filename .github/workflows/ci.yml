name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  build-release-assets:
    name: Build release assets
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            demo/package-lock.json
            editors/vscode/package-lock.json

      - name: Set up Rust WASM target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown --toolchain stable

      - name: Compute release version
        id: release-version
        run: |
          set -euo pipefail

          vscode_version="$(node -p "require('./editors/vscode/package.json').version")"
          demo_version="$(node -p "require('./demo/package.json').version")"
          wasm_pkg_id="$(cargo pkgid -p pdl-wasm)"
          wasm_version="${wasm_pkg_id##*#}"

          if [ "${vscode_version}" != "${wasm_version}" ]; then
            echo "VS Code package version ${vscode_version} does not match pdl-wasm version ${wasm_version}" >&2
            exit 1
          fi

          if [ "${demo_version}" != "${wasm_version}" ]; then
            echo "Demo package version ${demo_version} does not match pdl-wasm version ${wasm_version}" >&2
            exit 1
          fi

          echo "version=${wasm_version}" >> "${GITHUB_OUTPUT}"

      - name: Install VS Code extension dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Package VS Code extension
        working-directory: editors/vscode
        run: npm run package

      - name: Stage VSIX artifacts
        run: |
          set -euo pipefail

          version="${{ steps.release-version.outputs.version }}"
          mkdir -p artifacts/vscode
          cp "editors/vscode/pdl-vscode-${version}.vsix" "artifacts/vscode/pdl-vscode-${version}.vsix"
          cp "editors/vscode/pdl-vscode-${version}.vsix" "artifacts/vscode/pdl-vscode-latest.vsix"

      - name: Build WASM runtime
        working-directory: demo
        run: npm run build:wasm

      - name: Stage WASM artifacts
        run: |
          set -euo pipefail

          version="${{ steps.release-version.outputs.version }}"
          mkdir -p artifacts/wasm
          cp "demo/public/wasm/pdl.wasm" "artifacts/wasm/pdl-wasm-${version}.wasm"
          cp "demo/public/wasm/pdl.wasm" "artifacts/wasm/pdl-wasm-latest.wasm"

      - name: Publish GitHub release assets
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release-version.outputs.version }}
          name: PDL v${{ steps.release-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            artifacts/vscode/pdl-vscode-${{ steps.release-version.outputs.version }}.vsix
            artifacts/vscode/pdl-vscode-latest.vsix
            artifacts/wasm/pdl-wasm-${{ steps.release-version.outputs.version }}.wasm
            artifacts/wasm/pdl-wasm-latest.wasm
